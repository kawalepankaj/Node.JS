# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap – non-sensitive runtime configuration
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-poc-config
  namespace: devops-poc
  labels:
    app: devops-poc-app
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"

---
# ─────────────────────────────────────────────────────────────────────────────
# Secret – sensitive values (base64 encoded)
# In production use External Secrets Operator or AWS Secrets Manager instead.
#
# To generate:  echo -n 'your-value' | base64
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: devops-poc-secret
  namespace: devops-poc
  labels:
    app: devops-poc-app
type: Opaque
data:
  # Replace with real base64-encoded values before deploying
  APP_SECRET_KEY: Y2hhbmdlbWVpbnByb2Q=     # changemeInprod
  DB_PASSWORD:    c2VjcmV0cGFzc3dvcmQ=      # secretpassword
