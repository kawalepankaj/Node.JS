# ─────────────────────────────────────────────────────────────────────────────
# Service – ClusterIP (internal) for the app
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: devops-poc-app-svc
  namespace: devops-poc
  labels:
    app: devops-poc-app
  annotations:
    # Tells Prometheus to scrape this service endpoint
    prometheus.io/scrape: "true"
    prometheus.io/port:   "3000"
    prometheus.io/path:   "/metrics"
spec:
  type: ClusterIP        # Change to LoadBalancer for AWS ELB, or use an Ingress
  selector:
    app: devops-poc-app
  ports:
    - name:       http
      protocol:   TCP
      port:       80
      targetPort: http   # maps to containerPort named "http" (3000)

---
# ─────────────────────────────────────────────────────────────────────────────
# HorizontalPodAutoscaler – scale 2→10 replicas based on CPU & memory
# Requires metrics-server installed in the cluster.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-poc-app-hpa
  namespace: devops-poc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-poc-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               AverageUtilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type:               AverageUtilization
          averageUtilization: 80

---
# ─────────────────────────────────────────────────────────────────────────────
# PodDisruptionBudget – ensure at least 1 pod stays up during node drains
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: devops-poc-app-pdb
  namespace: devops-poc
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: devops-poc-app
